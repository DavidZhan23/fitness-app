name: Issue triage (new issue)

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage-new-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body ?? '';
            const labels = new Set(issue.labels.map((l) => l.name));

            if (!labels.has('status:todo') && !labels.has('status:doing')) {
              labels.add('status:todo');
            }

            const priorityLabels = ['priority:high', 'priority:med', 'priority:low'];
            let priorityLabel = 'priority:med';

            if (labels.has('bug')) {
              const impactMatch = body.match(/###\s*对你影响[\s\S]*?\n\n([^\n]+)/);
              const impact = impactMatch?.[1]?.trim() ?? '';
              const impactMap = {
                用不了: 'priority:high',
                数据不对: 'priority:high',
                体验差: 'priority:med',
                小问题: 'priority:low',
              };
              priorityLabel = impactMap[impact] ?? 'priority:med';
            } else {
              const priMatch = body.match(/###\s*优先级[\s\S]*?\n\n([高中低])/);
              const pri = priMatch?.[1] ?? '中';
              const featureMap = { 高: 'priority:high', 中: 'priority:med', 低: 'priority:low' };
              priorityLabel = featureMap[pri] ?? 'priority:med';
            }

            for (const p of priorityLabels) {
              labels.delete(p);
            }
            labels.add(priorityLabel);

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...labels],
            });

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: [issue.user.login],
            });

      - name: Add issue to Requirements project
        if: vars.REQUIREMENTS_PROJECT_URL != ''
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.REQUIREMENTS_PROJECT_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
