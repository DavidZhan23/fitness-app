name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Use PAT so release PR events can trigger CI checks.
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Merge-commit PRs produce duplicate bullets (merge + squash commit); dedupe on release PR branch.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.pr != '' }}
        with:
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          ref: release-please--branches--main

      - name: Deduplicate CHANGELOG on release PR
        if: ${{ steps.release.outputs.pr != '' }}
        run: node scripts/dedupe-changelog.mjs

      - name: Push deduped CHANGELOG
        if: ${{ steps.release.outputs.pr != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: deduplicate CHANGELOG entries"
            git push origin HEAD
          fi
