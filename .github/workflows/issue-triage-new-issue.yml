name: Issue triage (new issue)

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage-new-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body ?? '';
            const labels = new Set(issue.labels.map((l) => l.name));

            if (!labels.has('status:todo') && !labels.has('status:doing')) {
              labels.add('status:todo');
            }

            const priMatch = body.match(/###\s*优先级[\s\S]*?\n\n([高中低])/);
            const pri = priMatch?.[1] ?? '中';
            const priMap = { 高: 'priority:high', 中: 'priority:med', 低: 'priority:low' };
            for (const p of ['priority:high', 'priority:med', 'priority:low']) {
              labels.delete(p);
            }
            labels.add(priMap[pri] ?? 'priority:med');

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...labels],
            });

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: [issue.user.login],
            });

      - name: Add issue to Requirements project
        if: vars.REQUIREMENTS_PROJECT_URL != ''
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.REQUIREMENTS_PROJECT_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
