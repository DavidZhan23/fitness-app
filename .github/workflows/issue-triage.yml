name: Issue triage

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  issues: write
  pull-requests: read

jobs:
  triage-new-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body ?? '';
            const labels = new Set(issue.labels.map((l) => l.name));

            if (!labels.has('status:todo') && !labels.has('status:doing')) {
              labels.add('status:todo');
            }

            const priMatch = body.match(/###\s*优先级[\s\S]*?\n\n([高中低])/);
            const pri = priMatch?.[1] ?? '中';
            const priMap = { 高: 'priority:high', 中: 'priority:med', 低: 'priority:low' };
            for (const p of ['priority:high', 'priority:med', 'priority:low']) {
              labels.delete(p);
            }
            labels.add(priMap[pri] ?? 'priority:med');

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...labels],
            });

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: [issue.user.login],
            });

      - name: Add issue to Requirements project
        if: vars.REQUIREMENTS_PROJECT_URL != ''
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.REQUIREMENTS_PROJECT_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  triage-linked-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body ?? '';
            const re =
              /(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)/gi;
            const ids = [...new Set([...body.matchAll(re)].map((m) => m[1]))];
            if (ids.length === 0) return;

            for (const id of ids) {
              const num = Number(id);
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
              });
              const labels = issue.labels.map((l) => l.name).filter((n) => n !== 'status:todo');
              if (!labels.includes('status:doing')) labels.push('status:doing');
              await github.rest.issues.setLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                labels,
              });
            }
