name: Auto Merge Release PR

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve-and-enable:
    if: >
      startsWith(github.event.pull_request.head.ref, 'release-please--') &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Auto approve release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr review "$PR_NUMBER" --repo "$REPO" --approve --body "Auto-approved release PR."

      - name: Enable auto-merge (merge commit)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --merge
