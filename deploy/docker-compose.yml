services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
      POSTGRES_DB: fitness
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../server/migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ../server/migrations/002_widen_activity_factor.sql:/docker-entrypoint-initdb.d/002_widen_activity_factor.sql:ro
      - ../server/migrations/003_add_nickname.sql:/docker-entrypoint-initdb.d/003_add_nickname.sql:ro
      - ../server/migrations/004_community_visible.sql:/docker-entrypoint-initdb.d/004_community_visible.sql:ro
      - ../server/migrations/005_social.sql:/docker-entrypoint-initdb.d/005_social.sql:ro
      - ../server/migrations/008_community_notify_seen.sql:/docker-entrypoint-initdb.d/008_community_notify_seen.sql:ro
      - ../server/migrations/009_comment_replies.sql:/docker-entrypoint-initdb.d/009_comment_replies.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fitness -d fitness']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ../server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://fitness:${POSTGRES_PASSWORD:-change_me_strong_password}@postgres:5432/fitness
      JWT_SECRET: ${JWT_SECRET:-change_me_jwt_secret_min_32_chars}
      REGISTRATION_KEY: ${REGISTRATION_KEY:-454676}
      DISPLAY_TIMEZONE: ${DISPLAY_TIMEZONE:-Asia/Shanghai}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    ports:
      - '3001:3001'
    expose:
      - '3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  web:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '80:80'
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
